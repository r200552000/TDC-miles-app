<div class="tdc-row tdc-mb-1">
    <div class="tdc-col-5">
      <label class="form-label">幣別</label>
      <select id="currency-type" class="form-select" onchange="toggleFxInput(this.value)">
        <option value="TWD">🇹🇼 台幣</option>
        <option value="FOREIGN">🌎 外幣</option>
      </select>
    </div>
    <div class="tdc-col-7">
      <label class="form-label">付款情境</label>
      <select id="payment" class="form-select">
        <option value="physical">💳 實體卡</option>
        <option value="online">🌐 線上刷卡</option>
        <option value="apple_pay">🍎 Apple Pay</option>
        <option value="line_pay">🟩 LINE Pay</option>
      </select>
      <div class="small text-muted mt-2 px-1" style="line-height: 1.4;">💡 此欄位用來選擇付款發生方式（如實體刷卡、線上刷卡、Apple Pay、LINE Pay），不等同消費類別。</div>
    </div>
</div>

<div id="fx-input-group" class="mt-2 tdc-mb-2 p-3" style="background: #f0f9ff; border: 2px dashed #bae6fd; border-radius: 16px; display: none;">
    <div class="tdc-flex tdc-justify-between tdc-align-center tdc-mb-2">
        <label class="form-label text-primary small tdc-m-0">設定外幣與匯率</label>
        <a href="https://rate.bot.com.tw/xrt?Lang=zh-TW" target="_blank" class="small fw-bold tdc-flex tdc-align-center text-primary-dark"><svg class="lucide me-1" style="width:14px;height:14px;"><use href="#icon-external"/></svg> 牌告匯率參考</a>
    </div>
    <div class="tdc-row tdc-mb-2">
        <div class="tdc-col-5">
            <div class="input-wrapper">
                <input type="text" id="fx-currency-code" class="form-control text-center fw-bold pe-5" placeholder="如: 日本/JPY" oninput="handleCurrencyInput(this.value)">
                <button class="btn-inline-clear" type="button" onclick="clearFxCurrencyCode()">⊗</button>
            </div>
        </div>
        <div class="tdc-col-7">
            <button class="btn btn-outline-primary tdc-w-100 h-100 fw-bold rounded-pill" type="button" onclick="autoFetchFxRate()" id="btn-fetch-fx">
                <svg class="lucide me-1" style="width:16px;height:16px;"><use href="#icon-refresh"/></svg>自動帶入匯率
            </button>
        </div>
    </div>
    <div id="fx-currency-hint" class="small fw-bold text-success tdc-mb-2" style="display:none;"></div>
    <div class="tdc-flex tdc-align-center gap-2 tdc-mb-1 mt-2">
        <span class="fw-bold text-secondary" style="white-space: nowrap;">1 外幣 =</span>
        <div class="input-wrapper tdc-grow-1">
            <input type="number" id="fx-rate-input" class="form-control pe-5" placeholder="可手動修改" inputmode="decimal" min="0" step="0.0001" oninput="updateFxFeedback(true)">
            <button class="btn-inline-clear" type="button" onclick="clearInput('fx-rate-input')">⊗</button>
        </div>
        <span class="fw-bold text-secondary">TWD</span>
    </div>
    <div id="fx-feedback" class="small fw-bold mt-2" style="color: #ef4444; display: none;">
        💡 實質匯率 (含1.5%)：<span id="fx-real-rate">0</span>
        <span id="fx-manual-warning" class="text-warning ms-2" style="display:none;">(✏️ 已手動覆寫匯率)</span>
        <div id="fx-api-time" class="text-muted mt-1 fw-normal" style="font-size: 0.75rem; display: none;"></div>
    </div>
</div>

<div class="tdc-mb-3 mt-3">
  <label class="form-label" id="amount-label">🇹🇼 消費金額 (TWD)</label>
  <div class="input-wrapper">
    <input type="number" id="amount" class="form-control pe-5" placeholder=" " inputmode="decimal" oninput="checkInputStyle(this)">
    <button class="btn-inline-clear" type="button" onclick="clearInput('amount')">⊗</button>
  </div>
  <button class="btn btn-outline-danger btn-sm tdc-w-100 mt-2 rounded-pill fw-bold" onclick="toggleNegative('amount')"><svg class="lucide me-1" style="width:14px;height:14px;"><use href="#icon-refresh"/></svg>退刷 / 修正上限額度</button>
</div>

<div class="tdc-mb-3">
  <label class="form-label">消費類別 / 備註</label>
  <select id="category" class="form-select tdc-mb-1" onchange="updateKeywordPlaceholder()"></select>
  <div class="small text-muted mb-2 px-1" style="line-height: 1.4;">💡 此欄位用來選擇消費性質（如網購、餐飲、旅遊、航空）。「網購」屬於消費類別，可與「線上刷卡」同時成立。</div>
  <div class="input-wrapper">
    <input type="text" id="keyword-input" class="form-control pe-5" placeholder="輸入店家關鍵字 (如: 麥當勞, Agoda, JPY, 日本)..." style="font-size:0.9rem;">
    <button class="btn-inline-clear" type="button" onclick="clearInput('keyword-input')">⊗</button>
  </div>
  <div class="small text-muted mt-2 px-1">💡 提示：輸入「日本、JPY」或「歐洲、英國」可自動觸發特定卡片之海外加碼與防護網。</div>
</div>

<button onclick="calculate()" class="btn-action">開始計算 <svg class="lucide ms-2"><use href="#icon-calc"/></svg></button>
